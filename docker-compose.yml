networks:
  deps-api:
    driver: bridge

services:
  db:
    image: postgres:18-alpine
    networks:
      - deps-api
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
      POSTGRES_DB: ${DB_NAME:-deps_api}
    ports:
      - "5532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-deps_api}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    networks:
      - deps-api
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-yourpassword}
      DB_NAME: ${DB_NAME:-deps_api}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy